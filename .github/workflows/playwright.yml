# ─────────────────────────────────────────────
# ▶︎  Playwright CI ◀︎
# One clean test run after every merge to main
# ─────────────────────────────────────────────
name: Playwright Tests        # Label shown in Actions UI
# ────────────────
# Triggers
# ────────────────
on:
  push:                  # Run only when commits land on main
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
# ────────────────
# Jobs
# ────────────────
jobs:
  test:                # Single job for the entire suite
    timeout-minutes: 60
    runs-on: ubuntu-latest  # Fresh Linux VM each time
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
